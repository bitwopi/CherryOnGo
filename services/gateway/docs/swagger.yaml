        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server_api_gateway_rest_handers_users_refresh.Response'
      summary: Обновление jwt токена
      tags:
      - auth
  /api/auth/register:
