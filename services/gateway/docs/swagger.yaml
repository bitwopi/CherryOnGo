paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Возвращает jwt token
      parameters:
      - description: Логин, пароль
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/server_api_gateway_rest_handers_users_sign.Request'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server_api_gateway_rest_handers_users_sign.Response'
      summary: Аутентификация пользователя
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Возвращает jwt token
      parameters:
